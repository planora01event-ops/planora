<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehandi Artists | Planora Gwalior</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="vendors.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"><img src="images/image.png" alt="Planora" class="logo-image"></div>
                <div class="logo-text"><span class="logo-highlight">Planora</span></div>
            </a>
            <nav class="nav-links-pc">
                <a href="index.html">Home</a>
                <a href="index.html#categories">Venues</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#contact">Contact</a>
            </nav>
            <div class="nav-actions">
                <a class="btn btn-cart" href="cart.html">View Cart</a>
            </div>
        </div>
    </header>

    <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> Mehandi Artists</div>

    <section class="hero fade-in" style="background: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;">
        <div class="hero-content">
            <h1>🌿 Mehandi Artists</h1>
            <p>Professional mehandi artists for your special celebrations.</p>
            <a href="#vendors" class="hero-btn bounce">Explore Mehandi Artists</a>
        </div>
    </section>

    <main>
        <section class="venues-section" id="vendors">
            <div class="cards" id="cards"></div>
        </section>
    </main>

    <script src="js/cart.js"></script>
    <script>
        const mehandi = [
            {
                name: "Raju Mehandi",
                address: "Dahi Mandi, Topi Bazar, Lashkar, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Vijay Mehandi",
                address: "Padav, Laxmi Bai Colony, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Gaurav Mehandi",
                address: "Jiwaji Chowk, Topi Bazar, Lashkar, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Rakesh Mehandi",
                address: "DD Mall, Phool Bagh, Lashkar, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Aryan Mehandi",
                address: "Opposite Big Bazar, DB Mall, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Sadhna Mehandi",
                address: "Near Adarsh Nagar, Behind Abhinandan Vatika, Pinto Park, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Bunty Mehandi",
                address: "Near Pitambara Jewel, Maharaja Complex, DD Nagar, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Sonu Mehandi",
                address: "Prateek Jewel, Sadar Bazar Rd, Morar, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Shagun Mehandi",
                address: "Bada Market, Topi Bazar, Gwalior",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=800&q=80"
            },
            {
                name: "Ashish Mehandi",
                address: "Agra, UP",
                type: "Trusted",
                img: "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80"
            }
        ];

        function renderMehandi() {
            const box = document.getElementById('cards');
            box.innerHTML = '';
            mehandi.forEach(item => {
                const div = document.createElement('div');
                div.className = item.type === 'Premium' ? 'card premium' : 'card';
                div.innerHTML = `
                    <div class="card-media"><img src="${item.img}" alt="${item.name}"></div>
                    <div class="card-body">
                        <h3>${item.name}</h3>
                        <p class="muted">📍 ${item.address}</p>
                        <p class="tag">⭐ ${item.type}</p>
                        <div class="card-actions">
                            <button class="btn btn-add">Add to Cart</button>
                            <button class="btn btn-book">Book Now</button>
                        </div>
                    </div>`;

                div.querySelector('.btn-add').addEventListener('click', () => {
                    addServiceToCart({ vendor: item.name, category: 'Mehandi', price: 0, displayPrice: 'Custom' });
                    showCartMessage(item.name);
                });

                div.querySelector('.btn-book').addEventListener('click', () => {
                    addServiceToCart({ vendor: item.name, category: 'Mehandi', price: 0, displayPrice: 'Custom' });
                    window.location.href = 'booking.html';
                });

                box.appendChild(div);
            });
        }

        function showCartMessage(name) {
            const old = document.querySelector('.cart-toast');
            if (old) old.remove();
            const msg = document.createElement('div');
            msg.className = 'cart-toast';
            msg.innerHTML = `✅ <b>${name}</b><br>Added to cart &nbsp; <a href="cart.html">View Cart →</a>`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3500);
        }

        document.addEventListener('DOMContentLoaded', renderMehandi);
    </script>
</body>
</html>
