<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

<body>

      </nav>

  <main>
    <h1 class="title">🎨 Decorators</h1>
    <div class="container">
      <div class="cards" id="cards"></div>

  </main>

  <script src="js/cart.js"></script>

  },
  {

    address: "Brij Bihar Colony, Nai Sadak, Gwalior",
    type: "Premium",
    badge: "🏆 Trusted Vendor • Our Choice",

  },
  {
    name: "Vaishnavi Decoration",
    address: "Hanuman Chauraha, Jiwaji Ganj, Gwalior",
    type: "Good",
    badge: "🏆 Trusted Vendor",
    img: "https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=800&q=80"
  },
  {
    name: "Shri Krishna Decoration",
    address: "Koteshwar Rd, Vinay Nagar, Gwalior",
    type: "Good",
    badge: "🏆 Trusted Vendor",

  },
  {
    name: "Skyrang Décor",
    address: "Mayur Nagar, Thatipur, Gwalior",
    type: "Good",
    badge: "🏆 Trusted Vendor",
    img: "https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=800&q=80"
  },
  {
    name: "Events Orion",
    address: "Near Chetak Puri, Shriram Colony, Vijay Nagar, Gwalior",
    type: "Premium",
    badge: "🏆 Trusted Vendor • Our Choice",
    img: "https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=800&q=80"
  },
  {
    name: "Bliss Weddings",
    address: "Kesar Tower, Race Course Rd, Gwalior",
    type: "Premium",
    badge: "🏆 Trusted Vendor • Our Choice",
    img: "https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=80"
  },
  {
    name: "Sai Decoration",
    address: "Near St Teresa School, Sikandar Kampoo, Gwalior",
    type: "Good",
    badge: "🏆 Trusted Vendor",
    img: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=800&q=80"
  }
];

    const box = document.getElementById('cards');
    function renderCards() {
      box.innerHTML = '';
      decorators.forEach(c => {
        const div = document.createElement('div');
        div.className = c.type === 'Premium' ? 'card premium' : 'card';
        div.innerHTML = `
          <div class="card-media"><img src="${c.img}" alt="${c.name}"></div>
          <div class="card-body">
            <h3>${c.name}</h3>
            <p class="muted">📍 ${c.address}</p>
            <p class="tag">⭐ ${c.type}</p>
            <div class="card-actions">
              <button class="btn btn-add">Add to Cart</button>
              <button class="btn btn-book">Book Now</button>
            </div>
          </div>
        `;

        const addBtn = div.querySelector('.btn-add');
        const bookBtn = div.querySelector('.btn-book');
        addBtn.addEventListener('click', (ev) => {
          ev.preventDefault();
          addServiceToCart({ vendor: c.name, category: 'Decoration', price: c.price, displayPrice: c.price });
          showCartMessage(c.name);
        });
        bookBtn.addEventListener('click', (ev) => {
          ev.preventDefault();
          addServiceToCart({ vendor: c.name, category: 'Decoration', price: c.price, displayPrice: c.price });
          window.location.href = 'booking.html';
        });

        box.appendChild(div);
      });
    }

    renderCards();

    function showCartMessage(name) {
      const old = document.querySelector('.cart-toast'); if (old) old.remove();
      const msg = document.createElement('div');
      msg.className = 'cart-toast';
      msg.innerHTML = `✅ <b>${name}</b><br>Added to cart &nbsp; <a href="cart.html">View Cart →</a>`;
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 3500);
    }
  </script>

  
</body>
</html>
