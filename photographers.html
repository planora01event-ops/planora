  <script>

];

    const box = document.getElementById('cards');
    function render() {
      box.innerHTML = '';
      photographers.forEach(c => {
        const div = document.createElement('div');
        div.className = c.type === 'Premium' ? 'card premium' : 'card';
        div.innerHTML = `
          <div class="card-media"><img src="${c.img}" alt="${c.name}"></div>
          <div class="card-body">
            <h3>${c.name}</h3>
            <p class="muted">📍 ${c.address}</p>
            <p class="tag">⭐ ${c.type}</p>
            <div class="card-actions">
              <button class="btn btn-add">Add to Cart</button>
              <button class="btn btn-book">Book Now</button>
            </div>
          </div>`;

        div.querySelector('.btn-add').addEventListener('click', () => { addServiceToCart({ vendor: c.name, category: 'Photography', price: c.price, displayPrice: c.price }); showCartMessage(c.name); });
        div.querySelector('.btn-book').addEventListener('click', () => { addServiceToCart({ vendor: c.name, category: 'Photography', price: c.price, displayPrice: c.price }); window.location.href = 'booking.html'; });
        box.appendChild(div);
      });
    }

    render();
    function showCartMessage(name){ const old = document.querySelector('.cart-toast'); if(old) old.remove(); const msg = document.createElement('div'); msg.className='cart-toast'; msg.innerHTML = `✅ <b>${name}</b><br>Added to cart &nbsp; <a href="cart.html">View Cart →</a>`; document.body.appendChild(msg); setTimeout(()=>msg.remove(),3500);} 
  </script>

</body>
