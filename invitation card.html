function addToCart(service) {
  if (typeof addServiceToCart !== "function") {
    console.error("addServiceToCart is not defined");
    return;
  }

  addServiceToCart({
    vendor: service.name,
    category: 'Invitations',
    price: service.price || 0,
    displayPrice: service.displayPrice || service.price || 'Custom'
  });
}

function handleBook(service) {
  addToCart(service);
  window.location.href = 'booking.html';
}

function showCartMessage(name) {
  const existing = document.querySelector('.cart-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'cart-toast';
  toast.innerHTML = `Added <strong>${name}</strong> to cart. <a href="cart.html">View Cart</a>`;

  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function renderCards() {
  const box = document.getElementById('cards');
  if (!box) return;

  box.innerHTML = '';

  invitations.forEach(service => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="card-media">
        <img src="${service.img || 'https://via.placeholder.com/300'}" alt="${service.name}">
      </div>
      <div class="card-body">
        <h3>${service.name}</h3>
        <p class="muted">Location: ${service.address || 'Not Available'}</p>
        <p class="tag">Service: ${service.service}</p>
        <p class="price">Price: ${service.displayPrice || service.price ? '₹' + service.price : 'Contact for price'}</p>
        <p class="badge">${service.badge || ''}</p>
        <div class="card-actions">
          <button class="btn btn-add">Add to Cart</button>
          <button class="btn btn-book">Book Now</button>
        </div>
      </div>`;

    const addBtn = div.querySelector('.btn-add');
    const bookBtn = div.querySelector('.btn-book');

    addBtn.addEventListener('click', (event) => {
      event.preventDefault();
      addToCart(service);
      showCartMessage(service.name);
    });

    bookBtn.addEventListener('click', (event) => {
      event.preventDefault();
      handleBook(service);
    });

    box.appendChild(div);
  });
}

document.addEventListener('DOMContentLoaded', renderCards);
